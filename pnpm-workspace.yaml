packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@clerk/clerk-react": ^5.61.3
  "@clerk/react": ^6.1.4
  "@types/node": ^24
  convex: ^1.34.1
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
