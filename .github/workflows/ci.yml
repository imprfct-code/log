name: Checks

on:
  pull_request:
    branches: [main, development]

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Format
        run: pnpm run fmt:check
      - name: Lint
        run: pnpm run lint
      - name: Typecheck
        run: pnpm run typecheck
      - name: Test — convex
        run: pnpm test
      - name: Test — workspaces
        run: pnpm run -r test
      - name: Build
        run: pnpm run build
      - name: Clean summary
        run: echo -n > "$GITHUB_STEP_SUMMARY"
